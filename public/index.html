<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaAI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<aside class="sidebar">

<div class="logo">🚀 NovaAI</div>
<p class="desc">Assistant IA intelligent</p>

<button class="newChat" onclick="newChat()">
＋ Nouveau chat
</button>

<h3>Historique</h3>

<div id="history" class="history"></div>

<div class="sidebarBottom">
<button onclick="toggleSettings()" class="settingsBtn">
⚙️ Paramètres
</button>
</div>

</aside>


<main class="chat">


<header class="topbar">

<div>
<h2>NovaAI</h2>
<span>🟢 En ligne</span>
</div>

</header>


<div id="messages" class="messages">

<div class="welcome">

<h1>Bienvenue sur NovaAI 🚀</h1>

<p>
Pose tes questions, crée des images et analyse tes fichiers.
</p>

<div class="suggestions">

<button onclick="sendQuick('Explique-moi une idée')">
💡 Expliquer
</button>

<button onclick="sendQuick('Aide-moi à écrire un texte')">
✍️ Écrire
</button>

<button onclick="sendQuick('Donne-moi une idée de projet')">
🚀 Projet
</button>

</div>

</div>

</div>


<div class="imageTools">

<label class="upload">
📷 Image
<input id="imageUpload" type="file" accept="image/*" onchange="analyzeImage()">
</label>


<input id="imagePrompt" placeholder="Décris une image à créer...">

<button onclick="generateImage()" class="imageBtn">
🎨 Créer
</button>

</div>


<div class="inputBar">

<input id="input" placeholder="Écris un message..." onkeydown="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()" class="sendBtn">
➤
</button>

</div>


</main>


<div id="settings" class="settings hidden">

<h2>Paramètres</h2>

<button onclick="toggleTheme()">
🌙 Mode sombre
</button>

<button onclick="clearHistory()">
🗑 Supprimer historique
</button>

<button onclick="toggleSettings()">
Fermer
</button>

</div>


</div>


<script src="app.js"></script>

</body>
</html>
