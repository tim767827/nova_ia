<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaAI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">NovaAI</div>

  <button class="newChat" onclick="clearChat()">+ Nouveau chat</button>

  <div class="history" id="history"></div>

  <div class="bottom">
    <button onclick="toggleSettings()" class="settingsBtn">⚙ Paramètres</button>
  </div>
</div>

<!-- CHAT -->
<div class="chat">

  <div id="messages" class="messages"></div>

  <div class="inputBar">
    <input id="input" placeholder="Écris ton message..." />
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

</div>

<!-- SETTINGS -->
<div id="settings" class="settings hidden">
  <h3>Paramètres</h3>
  <button onclick="toggleTheme()">🌗 Mode sombre / clair</button>
  <button onclick="toggleSettings()">Fermer</button>
</div>

<script src="app.js"></script>
</body>
</html>
