<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaAI 🚀</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">



<!-- =========================
SIDEBAR
========================= -->


<aside class="sidebar">


<div class="brand">


<div class="logo">
🚀 NovaAI
</div>


<div class="version">
Assistant IA nouvelle génération
</div>


<div class="tagline">
Discutez, créez et analysez sans limite.
</div>


</div>





<button 
class="newChat"
onclick="newChat()">

＋ Nouveau chat

</button>






<div class="historySearch">


<input
id="searchHistory"
placeholder="🔎 Rechercher une conversation">

</div>





<div class="historyTitle">

Historique

</div>



<div 
id="history"
class="history">

</div>





<div class="bottom">


<button
class="settingsBtn"
onclick="toggleSettings()">

⚙️ Paramètres

</button>



<button
class="exportBtn"
onclick="exportChat()">

📥 Exporter

</button>



</div>



</aside>










<!-- =========================
ZONE CHAT
========================= -->


<main class="chat">





<header class="topbar">


<h2>
NovaAI
</h2>



<div class="status">

🟢 En ligne

</div>



</header>









<div 
id="messages"
class="messages">





<div class="welcome">


<h1>
Bienvenue sur NovaAI 🚀
</h1>



<p>

Votre assistant IA pour discuter,
créer des images,
analyser vos fichiers et vous aider.

</p>





<div class="suggestions">


<button onclick="sendQuick('Explique moi une idée simplement')">

💡 Explique une idée

</button>



<button onclick="sendQuick('Aide moi à écrire un texte professionnel')">

✍️ Écris un texte

</button>



<button onclick="sendQuick('Donne moi une idée de projet')">

🚀 Trouve une idée

</button>



</div>



</div>





</div>









<!-- =========================
OUTILS
========================= -->


<div class="tools">



<div class="fileZone" id="dropZone">


📎 Ajouter un fichier


<input
type="file"
id="fileInput"
accept=".txt,.pdf,.docx"
>



<button onclick="sendFile()">

📄 Analyser fichier

</button>


</div>






<div class="imageZone">


📷 Analyser une image


<input
type="file"
id="imageUpload"
accept="image/*"
onchange="analyzeImage()"
>


</div>







<img
id="previewImage"
class="preview hidden">







<div class="imageCreator">


<input

id="imagePrompt"

placeholder="Décris l'image à créer..."

>



<button
onclick="generateImage()">

🎨 Créer

</button>


</div>





</div>







<!-- =========================
BARRE MESSAGE
========================= -->


<div class="inputBar">



<input

id="input"

placeholder="Écris ton message à NovaAI..."

onkeydown="
if(event.key==='Enter')
sendMessage()
"

>




<button

class="sendBtn"

onclick="sendMessage()"

>

➤

</button>



</div>









<!-- =========================
PARAMETRES
========================= -->


<div

id="settings"

class="settings hidden"

>



<h3>
Paramètres
</h3>





<button onclick="toggleTheme()">

🌗 Mode sombre

</button>





<button onclick="clearHistory()">

🗑️ Supprimer historique

</button>





<button onclick="toggleSettings()">

Fermer

</button>



</div>










</main>



</div>









<!-- =========================
SCRIPTS
========================= -->


<script src="app.js"></script>



</body>


</html>
