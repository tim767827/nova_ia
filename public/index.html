<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaAI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<!-- SIDEBAR -->

<aside class="sidebar">


<div class="brand">

<div class="logo">
✨ NovaAI
</div>

<div class="version">
Assistant IA
</div>

</div>



<button class="newChat" onclick="newChat()">

＋ Nouveau chat

</button>



<div class="historyTitle">

Historique

</div>


<div id="history" class="history"></div>



<div class="bottom">

<button onclick="toggleSettings()" class="settingsBtn">

⚙️ Paramètres

</button>

</div>


</aside>





<!-- ZONE CHAT -->

<main class="chat">


<header class="topbar">

<h2>NovaAI</h2>

<span>
🟢 En ligne
</span>

</header>




<div id="messages" class="messages">


<div class="welcome">

<h1>
Bonjour 👋
</h1>

<p>
Je suis NovaAI. Pose-moi une question ou crée une image.
</p>

</div>


</div>






<!-- OUTILS IMAGE -->

<div class="imageTools">


<label class="upload">

📷 Image

<input 
type="file"
id="imageUpload"
accept="image/*"
onchange="analyzeImage()">

</label>



<input 
id="imagePrompt"
placeholder="Décris l'image à créer...">



<button onclick="generateImage()" class="imageBtn">

🎨 Créer

</button>


</div>





<!-- BARRE MESSAGE -->

<div class="inputBar">


<input 
id="input"
placeholder="Écris ton message..."
onkeydown="if(event.key==='Enter') sendMessage()">


<button onclick="sendMessage()" class="sendBtn">

➤

</button>


</div>





<!-- IMAGE RESULTAT -->

<div class="imageResult">

<img 
id="generatedImage"
style="display:none;">

</div>




</main>


</div>





<!-- PARAMETRES -->


<div id="settings" class="settings hidden">


<h3>
Paramètres
</h3>


<button onclick="toggleTheme()">

🌗 Mode sombre

</button>


<button onclick="toggleSettings()">

Fermer

</button>


</div>





<script src="app.js"></script>


</body>

</html>
```
